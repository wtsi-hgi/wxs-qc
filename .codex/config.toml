# <repo>/.codex/config.toml
# Use this line to remove all sandbox restrictions (for agent testign only)
# default_permissions = ":danger-full-access"

# The custom permissions that allow localhost port binding - required to run Spark.
default_permissions = "hail-local"

[permissions.hail-local]
extends = ":workspace"

[permissions.hail-local.network]
enabled = true
allow_local_binding = true

[permissions.hail-local.network.domains]
"localhost" = "allow"
"127.0.0.1" = "allow"
"gz3vm"     = "allow"
"172.27.21.152" = "allow"

[features]
multi_agent = true

[agents]
max_threads = 1
max_depth = 2

[agents.planner]
description = "Planning-focused agent for WxS-QC. Produces small, reviewable plans and uses the $plan-change skill."
config_file = "../.agents/roles/planner.toml"

[agents.coder]
description = "Implementation-focused agent for WxS-QC. Implements only approved scoped plans using the $implement-wxs-qc skill."
config_file = "../.agents/roles/coder.toml"

[agents.validator]
description = "Evidence-driven validation agent for WxS-QC. Runs relevant Python/Hail checks, reviews regressions, and uses the $validate-wxs-qc skill."
config_file = "../.agents/roles/validator.toml"
